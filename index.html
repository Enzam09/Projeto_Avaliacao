<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA Copa do Mundo 2026 - Classificação</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo-area">
                <span class="sub-logo">FIFA</span>
                <h1 class="main-logo">COPA DO MUNDO 2026</h1>
            </div>
            <div class="phase-indicator">
                FASE DE GRUPOS <span class="dot"></span>
            </div>
        </header>

        <nav class="group-tabs" id="groupTabs">
            </nav>

        <main class="table-container">
            <h2 class="group-title" id="groupTitle">GRUPO A <span class="sub-title">CLASSIFICAÇÃO</span></h2>
            
            <div class="responsive-table">
                <table class="classification-table">
                    <thead>
                        <tr>
                            <th class="col-num">#</th>
                            <th class="col-selecao">SELEÇÃO</th>
                            <th>J</th>
                            <th>V</th>
                            <th>E</th>
                            <th>D</th>
                            <th>GP</th>
                            <th>GC</th>
                            <th>SG</th>
                            <th>PTS</th>
                            <th class="col-forma">FORMA</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>

            <footer class="table-footer">
                <div class="qualification-legend">
                    <span class="status-line"></span> Classificado para as oitavas
                </div>
                <div class="form-legend">
                    <span><span class="badge v">V</span> Vitória</span>
                    <span><span class="badge e">E</span> Empate</span>
                    <span><span class="badge d">D</span> Derrota</span>
                </div>
            </footer>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
